name: Deploy Docs to Firebase Hosting

on:
  push:
    branches:
      - master
      - publish
    # Only trigger the deployment if these specific files/folders change
    paths:
      - 'apps/docs/**'
      - 'packages/core/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-docs.yml'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      # We build the entire monorepo so that core is built before docs
      - name: Build the monorepo
        run: npm run build

      - name: Create unique build file to prevent Firebase Hosting 400 error
        run: echo "$(date +%s)" > apps/docs/dist/build.txt

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LE_KIT_DEV }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=service-account.json
          npx firebase-tools deploy --only hosting --project le-kit-dev --non-interactive --json > deploy_output.json 2>&1 || {
            EXIT_CODE=$?
            if grep -q "is the current active version" deploy_output.json; then
              echo "Deployment succeeded (ignoring active version 400 warning)."
              cat deploy_output.json
              rm -f service-account.json
              exit 0
            else
              echo "Deployment failed with exit code $EXIT_CODE"
              cat deploy_output.json
              rm -f service-account.json
              exit $EXIT_CODE
            fi
          }
          cat deploy_output.json
          rm -f service-account.json
