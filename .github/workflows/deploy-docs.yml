name: Deploy Docs to Firebase Hosting

on:
  push:
    branches:
      - main
      - publish
    # Only trigger the deployment if these specific files/folders change
    paths:
      - 'apps/docs/**'
      - 'packages/core/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-docs.yml'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # We build the entire monorepo so that core is built before docs
      - name: Build the monorepo
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LE_KIT_DEV }}
          projectId: le-kit-dev
          channelId: live
